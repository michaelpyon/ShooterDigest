name: Weekly Digest

on:
  schedule:
    # Every Monday at noon UTC (7am ET / 4am PT)
    - cron: '0 12 * * 1'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      force_rescrape:
        description: 'Force re-scrape even if snapshot exists'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ingest digest snapshot
        run: python ingest.py ${{ github.event.inputs.force_rescrape == 'true' && '--force' || '' }}

      - name: Render digest and store in Postgres
        run: python render_from_store.py

      # No git commit/push step — digest HTML is now stored in Postgres.
      # The Railway server reads from Postgres directly.
